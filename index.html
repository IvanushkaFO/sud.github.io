<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Никитин Владислав Витальевич</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.4;
            color: #111111;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: white;
            border: 1px solid #eaeef2;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.05);
            padding: 3rem 2.5rem;
            text-align: left;
        }

        /* имя крупно */
        .name {
            font-size: clamp(2rem, 7vw, 3.8rem);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 0.25rem;
            color: #0b1a26;
            letter-spacing: -0.02em;
        }

        /* центральная фраза — без дефисов, просто текст */
        .statement {
            font-size: clamp(2rem, 7vw, 3.8rem);
            font-weight: 500;
            color: #0b1a26;
            margin: 0.5rem 0 1.8rem 0;
            line-height: 1.2;
        }

        /* административная строка */
        .admin-line {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: 400;
            color: #1e2f3f;
            background: #f3f6f9;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            margin: 0.5rem 0 1.5rem 0;
            border: 1px solid #d9e2ec;
        }

        /* github */
        .github-footer {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #3a5670;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid #dfe7ef;
            padding-top: 1.5rem;
        }

        .github-footer a {
            color: #1e3b5a;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #b7c9dd;
        }

        .github-footer a:hover {
            border-bottom: 2px solid #0f283f;
        }

        /* скрытый комментарий для точности */
        .hidden-note {
            opacity: 0;
            height: 0;
            overflow: hidden;
            pointer-events: none;
        }

        @media (max-width: 450px) {
            .card {
                padding: 2rem 1.2rem;
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 1. Имя (Никитин Владислав Витальевич) -->
        <h1 class="name">Никитин Владислав Витальевич</h1>

        <!-- 2. Фраза (кидает партнёров) — чистый текст, никаких чёрточек сверху/снизу -->
        <div class="statement">кидает партнёров</div>

        <!-- 3. Строка про административное дело (как на вашем скриншоте) -->
        <div class="admin-line">Заведено административное дело №</div>

        <!-- 4. Подвал с github (размещено на GitHub) -->
        <div class="github-footer">
            <span>⎇</span>
            <span>размещено на</span>
            <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>

        <!-- технический комментарий (соответствие скриншоту) -->
        <div class="hidden-note">Никитин Владислав Витальевич --- кидает партнёров // административное дело №</div>
    </div>
</body>
</html>
